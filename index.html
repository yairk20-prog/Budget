<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;overflow:hidden;}
body{background:#080f1a;color:#e2e8f0;font-family:"Heebo",Arial,sans-serif;overscroll-behavior:none;}
input,button{font-family:"Heebo",Arial,sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#ffffff18;border-radius:4px;}
@keyframes fi{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes sl{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fi{animation:fi .28s ease forwards}
.sl{animation:sl .22s ease forwards}
.spin{animation:spin .8s linear infinite;display:inline-block}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

const USERS = [
  {id:"user1", name:"אני", color:"#6366f1", icon:"👨"},
  {id:"user2", name:"בת הזוג", color:"#ec4899", icon:"👩"},
];

const DEFAULT_CATS = [
  {key:"regular", label:"צריכה שוטפת", pct:47, color:"#6366f1", icon:"🏠"},
  {key:"entertainment", label:"בילויים וכיף", pct:5, color:"#ec4899", icon:"🎉"},
  {key:"shopping", label:"שופינג", pct:0, color:"#f59e0b", icon:"🛍️"},
  {key:"education", label:"התפתחות", pct:4, color:"#10b981", icon:"📚"},
  {key:"maaser", label:"מעשר", pct:10, color:"#8b5cf6", icon:"🤝"},
  {key:"savings", label:"חיסכון", pct:34, color:"#0ea5e9", icon:"💰"},
];

const INIT = {
  assets: {mom:130000, longTermStocks:90926, monetaryFund:300559, emergencyFund:52869, trip:2551, doron:2299},
  months: [
    {id:1, name:"חודש 1", income:22200, carry:0,
     budgets:{regular:10434,entertainment:1110,shopping:0,education:888,maaser:2220,savings:7548},
     expenses:{regular:7548,entertainment:782,shopping:2220,education:810,maaser:0,savings:8613},
     items:[
       {id:1,cat:"regular",desc:"שכ״ד",amount:4300,by:"user1"},
       {id:2,cat:"regular",desc:"חשמל",amount:420,by:"user1"},
       {id:3,cat:"regular",desc:"נאי",amount:1800,by:"user1"},
       {id:4,cat:"entertainment",desc:"פיצה",amount:176,by:"user2"},
       {id:5,cat:"shopping",desc:"יוחננוף",amount:340,by:"user2"},
       {id:6,cat:"education",desc:"ספר",amount:214,by:"user2"},
     ]},
    {id:2, name:"חודש 2", income:19225, carry:0,
     budgets:{regular:9036,entertainment:961,shopping:0,education:769,maaser:1922,savings:6537},
     expenses:{regular:6536,entertainment:0,shopping:374,education:370,maaser:0,savings:11736},
     items:[
       {id:1,cat:"regular",desc:"מגפיים",amount:200,by:"user2"},
       {id:2,cat:"shopping",desc:"מקס סטוק",amount:60,by:"user2"},
     ]},
  ],
};

const fmt = n => new Intl.NumberFormat("he-IL",{style:"currency",currency:"ILS",maximumFractionDigits:0}).format(n||0);
const LS = "bgt_v6";
const save = d => { try { localStorage.setItem(LS, JSON.stringify(d)); } catch{} };
const load = () => { try { const d=localStorage.getItem(LS); return d?JSON.parse(d):null; } catch { return null; } };

const card = (ex={}) => ({borderRadius:18, padding:14, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", ...ex});
const btn = (active, color="#6366f1", ex={}) => ({padding:"10px 0", borderRadius:12, border:"none", cursor:"pointer", fontSize:13, fontWeight:500, fontFamily:"Heebo,Arial,sans-serif", background:active?color:"rgba(255,255,255,0.07)", color:active?"#fff":"rgba(255,255,255,0.5)", ...ex});
const inp = {background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:12, padding:"9px 12px", color:"#e2e8f0", outline:"none", fontSize:14, textAlign:"right", width:"100%"};

function Ring({pct, color, size=68}) {
  const r=size/2-7, circ=2*Math.PI*r, dash=Math.min(pct/100,1)*circ;
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#ffffff10" strokeWidth={6}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
  </svg>;
}

function UBadge({uid}) {
  const u = USERS.find(x=>x.id===uid)||USERS[0];
  return <span style={{fontSize:10,padding:"1px 6px",borderRadius:99,background:`${u.color}22`,color:u.color,border:`1px solid ${u.color}44`}}>{u.name}</span>;
}

// ── LOGIN ──────────────────────────────
function Login({onLogin}) {
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:24,gap:20}} className="fi">
    <div style={{fontSize:48}}>💰</div>
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:26,fontWeight:900,marginBottom:6}}>תקציב משפחתי</div>
      <div style={{fontSize:14,opacity:0.5}}>בחר/י את המשתמש שלך</div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:320}}>
      {USERS.map(u => (
        <button key={u.id} onClick={()=>onLogin(u.id)}
          style={{padding:"16px 20px",borderRadius:18,border:`2px solid ${u.color}44`,background:`${u.color}12`,cursor:"pointer",display:"flex",alignItems:"center",gap:14,fontFamily:"Heebo,Arial,sans-serif"}}
          onTouchStart={e=>e.currentTarget.style.transform="scale(0.97)"}
          onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
          <div style={{width:42,height:42,borderRadius:14,background:`${u.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{u.icon}</div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,fontWeight:700,color:u.color}}>{u.name}</div>
            <div style={{fontSize:11,opacity:0.5}}>לחץ להיכנס</div>
          </div>
          <div style={{marginRight:"auto",opacity:0.3}}>←</div>
        </button>
      ))}
    </div>
    <div style={{fontSize:11,opacity:0.3,textAlign:"center"}}>כל המשתמשים רואים ועורכים את אותם הנתונים</div>
  </div>;
}

// ── CAT DETAIL ────────────────────────
function CatDetail({cat, month, uid, onUpdate, onBack}) {
  const [showAdd, setShowAdd] = useState(false);
  const [ni, setNi] = useState({desc:"", amount:""});
  const items = (month.items||[]).filter(i=>i.cat===cat.key);
  const spent = items.reduce((a,i)=>a+i.amount, 0);
  const budget = (month.budgets||{})[cat.key]||0;
  const pct = budget>0 ? Math.min((spent/budget)*100,100) : 0;

  const addItem = () => {
    if(!ni.desc||!ni.amount) return;
    const item = {id:Date.now(), cat:cat.key, desc:ni.desc, amount:parseFloat(ni.amount)||0, by:uid};
    const newItems = [...(month.items||[]), item];
    const newExp = {...(month.expenses||{}), [cat.key]:(month.expenses[cat.key]||0)+item.amount};
    onUpdate({...month, items:newItems, expenses:newExp});
    setNi({desc:"", amount:""}); setShowAdd(false);
  };

  const delItem = item => {
    const newItems = (month.items||[]).filter(i=>i.id!==item.id);
    const newExp = {...month.expenses, [cat.key]:Math.max(0,(month.expenses[cat.key]||0)-item.amount)};
    onUpdate({...month, items:newItems, expenses:newExp});
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}} className="sl">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexShrink:0}}>
      <button onClick={onBack} style={{...btn(false),width:38,height:38,padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>←</button>
      <span style={{fontSize:22}}>{cat.icon}</span>
      <div style={{flex:1}}>
        <div style={{fontSize:17,fontWeight:700}}>{cat.label}</div>
        <div style={{fontSize:11,opacity:0.45}}>{month.name}</div>
      </div>
    </div>

    <div style={card({background:`${cat.color}10`,border:`1px solid ${cat.color}2a`,marginBottom:10,flexShrink:0})}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Ring pct={pct} color={pct>100?"#ef4444":cat.color}/>
          <span style={{position:"absolute",fontSize:11,fontWeight:700}}>{Math.round(pct)}%</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,flex:1}}>
          {[["תקציב",fmt(budget),cat.color],["הוצאתי",fmt(spent),"#f87171"],["נותר",fmt(budget-spent),(budget-spent)>=0?"#6ee7b7":"#f87171"],["פריטים",items.length,"#e2e8f0"]].map(([l,v,c])=>(
            <div key={l}><div style={{fontSize:9,opacity:0.5}}>{l}</div><div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div></div>
          ))}
        </div>
      </div>
      <div style={{height:4,borderRadius:99,background:"rgba(255,255,255,0.07)",marginTop:10,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:pct>100?"#ef4444":cat.color,transition:"width .7s"}}/>
      </div>
    </div>

    <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:7}}>
      {items.length===0&&!showAdd&&(
        <div style={{textAlign:"center",padding:"36px 0",opacity:0.35,fontSize:13}}>
          <div style={{fontSize:32,marginBottom:8}}>{cat.icon}</div>אין עדיין הוצאות
        </div>
      )}
      {items.map(item => (
        <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,borderRadius:14,padding:"10px 12px",background:"rgba(255,255,255,0.04)",border:`1px solid ${cat.color}1a`}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14,fontWeight:500}}>{item.desc}</span>
              {item.by&&<UBadge uid={item.by}/>}
            </div>
          </div>
          <span style={{fontSize:14,fontWeight:700,color:cat.color}}>{fmt(item.amount)}</span>
          <button onClick={()=>delItem(item)} style={{width:27,height:27,borderRadius:8,border:"none",cursor:"pointer",background:"rgba(239,68,68,0.14)",color:"#f87171",fontSize:11}}>✕</button>
        </div>
      ))}
      {showAdd ? (
        <div style={card({background:"rgba(99,102,241,0.09)",border:"1px solid rgba(99,102,241,0.28)",display:"flex",flexDirection:"column",gap:8})}>
          <input value={ni.desc} onChange={e=>setNi({...ni,desc:e.target.value})} placeholder="תיאור ההוצאה" style={inp} autoFocus/>
          <input type="number" value={ni.amount} onChange={e=>setNi({...ni,amount:e.target.value})} placeholder="סכום בש״ח" style={inp} onKeyDown={e=>e.key==="Enter"&&addItem()}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={addItem} style={{...btn(true),padding:"11px 0"}}>✓ הוסף</button>
            <button onClick={()=>setShowAdd(false)} style={{...btn(false),padding:"11px 0"}}>ביטול</button>
          </div>
        </div>
      ) : (
        <button onClick={()=>setShowAdd(true)} style={{padding:"15px 0",borderRadius:16,border:`2px dashed ${cat.color}44`,background:`${cat.color}07`,color:cat.color,fontSize:13,cursor:"pointer",fontFamily:"Heebo,Arial,sans-serif"}}>
          + הוסף הוצאה
        </button>
      )}
    </div>
  </div>;
}

// ── MONTH DETAIL ──────────────────────
function MonthDetail({month, uid, cats, onUpdate, onBack}) {
  cats = cats || DEFAULT_CATS;
  const [catView, setCatView] = useState(null);
  const selCat = catView ? CATS.find(c=>c.key===catView) : null;
  const base = (month.income||0) + (month.carry||0);
  const totalSpent = Object.values(month.expenses||{}).reduce((a,b)=>a+b, 0);
  const pct = base>0 ? (totalSpent/base)*100 : 0;
  const left = base - totalSpent;

  if (selCat) return <CatDetail cat={selCat} month={month} uid={uid} onUpdate={m=>{onUpdate(m);}} onBack={()=>setCatView(null)}/>;

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}} className="fi">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexShrink:0}}>
      <button onClick={onBack} style={{...btn(false),width:38,height:38,padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>←</button>
      <div style={{flex:1,fontSize:17,fontWeight:700}}>{month.name}</div>
    </div>

    <div style={card({background:"linear-gradient(135deg,#1e293b,#0f1f35)",marginBottom:8,display:"flex",gap:12,alignItems:"center",flexShrink:0})}>
      <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <Ring pct={pct} color={pct>90?"#ef4444":"#6366f1"}/>
        <span style={{position:"absolute",fontSize:10,fontWeight:700}}>{Math.round(pct)}%</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,flex:1}}>
        <div><div style={{fontSize:9,opacity:0.45}}>הכנסה</div><div style={{fontSize:12,fontWeight:700,color:"#a5b4fc"}}>{fmt(month.income||0)}</div></div>
        <div><div style={{fontSize:9,opacity:0.45}}>+ העברה</div><div style={{fontSize:12,fontWeight:700,color:"#fcd34d"}}>{fmt(month.carry||0)}</div></div>
        <div><div style={{fontSize:9,opacity:0.45}}>סה"כ</div><div style={{fontSize:12,fontWeight:700}}>{fmt(base)}</div></div>
        <div><div style={{fontSize:9,opacity:0.45}}>נותר</div><div style={{fontSize:12,fontWeight:700,color:left>=0?"#6ee7b7":"#f87171"}}>{fmt(left)}</div></div>
      </div>
    </div>

    <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:7}}>
      {cats.map(cat => {
        const budget = (month.budgets||{})[cat.key]||0;
        const spent = (month.expenses||{})[cat.key]||0;
        const p = budget>0 ? Math.min((spent/budget)*100,100) : 0;
        const over = spent>budget;
        const itemCount = (month.items||[]).filter(i=>i.cat===cat.key).length;
        return <div key={cat.key} onClick={()=>setCatView(cat.key)}
          style={card({border:`1px solid ${cat.color}2e`,cursor:"pointer"})}
          onTouchStart={e=>e.currentTarget.style.background="rgba(255,255,255,0.07)"}
          onTouchEnd={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
            <div style={{display:"flex",gap:7,alignItems:"center"}}>
              <span style={{fontSize:18}}>{cat.icon}</span>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{cat.label}</div>
                <div style={{fontSize:10,opacity:0.4}}>{itemCount} פריטים</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:13,fontWeight:700,color:over?"#f87171":"#6ee7b7"}}>{fmt(spent)}</div>
                <div style={{fontSize:9,opacity:0.45}}>מתוך {fmt(budget)}</div>
              </div>
              <span style={{opacity:0.25}}>←</span>
            </div>
          </div>
          <div style={{height:4,borderRadius:99,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:over?"#ef4444":cat.color,transition:"width .7s"}}/>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── ASSETS ────────────────────────────
function Assets({assets, onUpdate}) {
  const total = Object.values(assets).reduce((a,b)=>a+b, 0);
  const items = [
    {key:"mom",label:"אמא",color:"#6366f1",icon:"👩"},
    {key:"longTermStocks",label:"מניות",color:"#10b981",icon:"📈"},
    {key:"monetaryFund",label:"קרן כספית",color:"#0ea5e9",icon:"🏦"},
    {key:"emergencyFund",label:"קרן חירום",color:"#f59e0b",icon:"🛡️"},
    {key:"trip",label:"טיול",color:"#ec4899",icon:"✈️"},
    {key:"doron",label:"דורון K130",color:"#8b5cf6",icon:"💼"},
  ];
  return <div style={{display:"flex",flexDirection:"column",gap:12,overflowY:"auto",flex:1}} className="fi">
    <div style={{borderRadius:22,padding:20,textAlign:"center",background:"linear-gradient(135deg,#6366f1,#8b5cf6)"}}>
      <div style={{fontSize:11,opacity:.85,marginBottom:4}}>סה"כ הון עצמי</div>
      <div style={{fontSize:30,fontWeight:900}}>{fmt(total)}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
      {items.map(it => (
        <div key={it.key} style={{borderRadius:16,padding:13,background:`${it.color}12`,border:`1px solid ${it.color}2e`}}>
          <div style={{fontSize:18,marginBottom:3}}>{it.icon}</div>
          <div style={{fontSize:10,opacity:.55,marginBottom:3}}>{it.label}</div>
          <div style={{fontSize:14,fontWeight:700,color:it.color}}>{fmt(assets[it.key]||0)}</div>
        </div>
      ))}
    </div>
  </div>;
}

// ── STATS ─────────────────────────────
function Stats({months}) {
  const ti = months.reduce((a,m)=>a+(m.income||0), 0);
  const ts = months.reduce((a,m)=>a+((m.expenses||{}).savings||0), 0);
  const allItems = months.flatMap(m=>m.items||[]);
  const byUser = USERS.map(u=>({...u, total:allItems.filter(i=>i.by===u.id).reduce((a,i)=>a+i.amount,0)}));
  return <div style={{display:"flex",flexDirection:"column",gap:12,overflowY:"auto",flex:1}} className="fi">
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
      {[["💰","הכנסות",fmt(ti),"#a5b4fc"],["🏦","חיסכון",fmt(ts),"#6ee7b7"],["📊","% חיסכון",`${ti>0?Math.round((ts/ti)*100):0}%`,"#f9a8d4"],["📅","חודשים",months.length,"#fcd34d"]].map(([ic,l,v,c])=>(
        <div key={l} style={card({textAlign:"center",padding:14})}>
          <div style={{fontSize:20,marginBottom:3}}>{ic}</div>
          <div style={{fontSize:9,opacity:.45,marginBottom:3}}>{l}</div>
          <div style={{fontSize:16,fontWeight:700,color:c}}>{v}</div>
        </div>
      ))}
    </div>
    <div style={card({padding:14})}>
      <div style={{fontSize:12,opacity:.45,marginBottom:10}}>הוצאות לפי משתמש</div>
      {byUser.map(u => (
        <div key={u.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <span style={{fontSize:16}}>{u.icon}</span>
            <span style={{fontSize:13,color:u.color,fontWeight:600}}>{u.name}</span>
          </div>
          <span style={{fontSize:14,fontWeight:700}}>{fmt(u.total)}</span>
        </div>
      ))}
    </div>
  </div>;
}


// ── CAT SETTINGS ──────────────────────
function CatSettings({cats, onUpdate, onClose, theme}) {
  const [local, setLocal] = React.useState(cats);
  const total = local.reduce((a,c)=>a+c.pct, 0);
  const isDark = theme==="dark";
  const bg = isDark ? "#080f1a" : "#f1f5f9";
  const cardBg = isDark ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)";
  const textColor = isDark ? "#e2e8f0" : "#1e293b";

  return <div style={{position:"fixed",inset:0,background:bg,zIndex:200,display:"flex",flexDirection:"column",padding:16,maxWidth:480,margin:"0 auto"}} className="fi">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexShrink:0}}>
      <button onClick={onClose} style={{...btn(false),width:38,height:38,padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>←</button>
      <div style={{flex:1,fontSize:17,fontWeight:700,color:textColor}}>⚙️ הגדרות קטגוריות</div>
      <button onClick={()=>onUpdate(local)} style={{...btn(true,"#6366f1"),padding:"8px 16px",fontSize:13}}>שמור</button>
    </div>

    <div style={{borderRadius:14,padding:"10px 14px",marginBottom:12,background:total===100?"rgba(16,185,129,0.1)":total>100?"rgba(239,68,68,0.1)":"rgba(252,211,77,0.1)",border:`1px solid ${total===100?"#10b981":total>100?"#ef4444":"#fcd34d"}`,flexShrink:0}}>
      <div style={{fontSize:13,fontWeight:700,color:total===100?"#6ee7b7":total>100?"#f87171":"#fcd34d"}}>
        {total===100 ? "✓ סה״כ 100% — מושלם!" : `סה״כ ${total}% — ${total>100?"חריג!":"נותר "+(100-total)+"%"}`}
      </div>
    </div>

    <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:10}}>
      {local.map(cat => (
        <div key={cat.key} style={{borderRadius:16,padding:14,background:cardBg,border:`1px solid ${cat.color}2e`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:20}}>{cat.icon}</span>
              <span style={{fontSize:14,fontWeight:600,color:textColor}}>{cat.label}</span>
            </div>
            <span style={{fontSize:24,fontWeight:900,color:cat.color}}>{cat.pct}%</span>
          </div>
          <input type="range" min="0" max="80" value={cat.pct}
            style={{width:"100%",height:6,borderRadius:99,outline:"none",cursor:"pointer",accentColor:cat.color}}
            onChange={e=>setLocal(local.map(c=>c.key===cat.key?{...c,pct:parseInt(e.target.value)}:c))}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:0.4,marginTop:4,color:textColor}}>
            <span>0%</span><span>80%</span>
          </div>
        </div>
      ))}
    </div>
  </div>;
}

// ── APP ───────────────────────────────
function App() {
  const [uid, setUid] = useState(null);
  const [connected, setConnected] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [data, setData] = useState(INIT);
  const [nav, setNav] = useState("months");
  const [selId, setSelId] = useState(null);
  const [tick, setTick] = useState(false);
  const [theme, setTheme] = useState(()=>localStorage.getItem("theme")||"dark");
  const [cats, setCats] = useState(()=>{try{const s=localStorage.getItem("cats");return s?JSON.parse(s):DEFAULT_CATS;}catch{return DEFAULT_CATS;}});
  const [showSettings, setShowSettings] = useState(false);
  const isDark = theme==="dark";
  const bg = isDark ? "#080f1a" : "#f1f5f9";
  const surface = isDark ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)";
  const border = isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.1)";
  const textPrimary = isDark ? "#e2e8f0" : "#1e293b";
  const textSecondary = isDark ? "rgba(255,255,255,0.45)" : "rgba(0,0,0,0.45)";

  useEffect(() => {
    const local = load();
    if (local) setData(local);

    const connect = () => {
      window._fbOnValue(window._fbRef("budget"), snap => {
        const d = snap.val();
        if (d) setData({assets: d.assets||INIT.assets, months: d.months||INIT.months});
        setConnected(true);
        setSyncing(false);
      });
    };
    if (window._fbReady) connect();
    else window.addEventListener("fb-ready", connect, {once:true});
  }, []);

  const persist = useCallback((newData) => {
    save(newData);
    setTick(t=>!t);
    if (window._fbReady) {
      setSyncing(true);
      window._fbSet(window._fbRef("budget"), {...newData, _t:Date.now()})
        .then(()=>setSyncing(false)).catch(()=>setSyncing(false));
    }
  }, []);

  const updateMonth = useCallback(m => {
    const newMonths = data.months.map(x => x.id===m.id ? m : x);
    const nd = {...data, months:newMonths};
    setData(nd);
    persist(nd);
  }, [data, persist]);

  const addMonth = () => {
    const last = data.months[data.months.length-1];
    const lastLeft = last ? ((last.income||0)+(last.carry||0)-Object.values(last.expenses||{}).reduce((a,b)=>a+b,0)) : 0;
    const carry = Math.max(0, Math.round(lastLeft));
    const nm = {
      id: Date.now(),
      name: `חודש ${data.months.length+1}`,
      income: 0, carry,
      budgets: Object.fromEntries(CATS.map(c=>[c.key, Math.round(carry*c.pct/100)])),
      expenses: Object.fromEntries(CATS.map(c=>[c.key, 0])),
      items: []
    };
    const nd = {...data, months:[...data.months, nm]};
    setData(nd); persist(nd);
  };

  const delMonth = (id, e) => {
    e.stopPropagation();
    const nd = {...data, months:data.months.filter(m=>m.id!==id)};
    setData(nd); persist(nd);
    if (selId===id) setSelId(null);
  };

  if (!uid) return <Login onLogin={setUid}/>;

  const cu = USERS.find(u=>u.id===uid)||USERS[0];
  const selMonth = selId ? data.months.find(m=>m.id===selId) : null;
  const NAVS = [{key:"months",icon:"📅",label:"חודשים"},{key:"assets",icon:"💎",label:"נכסים"},{key:"stats",icon:"📊",label:"סטטיסטיקה"}];

  return <div style={{background:bg,color:textPrimary,height:"100%",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",transition:"background .3s,color .3s"}}>
    {/* TopBar */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px 6px",flexShrink:0}}>
      <div>
        <div style={{fontSize:10,opacity:.4}}>תקציב משפחתי</div>
        <div style={{fontSize:19,fontWeight:900}}>המשפחה שלי 👨‍👩‍👧</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {syncing && <span className="spin" style={{fontSize:14}}>🔄</span>}
        {!syncing && connected && <span style={{fontSize:12,fontWeight:700,color:"#6ee7b7"}}>🟢 מחובר</span>}
        {!syncing && !connected && <span className="pulse" style={{fontSize:12,color:"#f87171"}}>🔴 מתחבר...</span>}
        <button onClick={()=>{const t=theme==="dark"?"light":"dark";setTheme(t);localStorage.setItem("theme",t);}} style={{width:32,height:32,borderRadius:10,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.08)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
          {theme==="dark"?"☀️":"🌙"}
        </button>
        <button onClick={()=>setShowSettings(true)} style={{width:32,height:32,borderRadius:10,border:"none",cursor:"pointer",background:"rgba(255,255,255,0.08)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>
        <button onClick={()=>setUid(null)} style={{padding:"4px 10px",borderRadius:10,background:`${cu.color}15`,border:`1px solid ${cu.color}30`,color:cu.color,cursor:"pointer",fontSize:11,fontFamily:"Heebo,Arial,sans-serif"}}>
          {cu.icon} {cu.name}
        </button>
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,overflow:"hidden",padding:"0 16px 68px",display:"flex",flexDirection:"column"}}>
      {nav==="months" && !selId && (
        <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:9,paddingTop:4}} className="fi">
          {data.months.map(month => {
            const ts = Object.values(month.expenses||{}).reduce((a,b)=>a+b, 0);
            const base = (month.income||0)+(month.carry||0);
            const p = base>0 ? Math.min((ts/base)*100,100) : 0;
            const left = base-ts;
            return <div key={month.id} onClick={()=>setSelId(month.id)}
              style={{borderRadius:20,padding:15,cursor:"pointer",background:"linear-gradient(135deg,#1e293b,#0f1f35)",border:"1px solid rgba(255,255,255,0.07)"}}
              onTouchStart={e=>e.currentTarget.style.transform="scale(0.97)"}
              onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700}}>{month.name}</div>
                  <div style={{fontSize:10,opacity:.4}}>{fmt(month.income||0)}{(month.carry||0)>0&&<span style={{color:"#fcd34d"}}> +{fmt(month.carry)}</span>}</div>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:14,fontWeight:700,color:left>=0?"#6ee7b7":"#f87171"}}>{fmt(left)}</div>
                  <div style={{fontSize:9,opacity:.35}}>נותר</div>
                </div>
              </div>
              <div style={{height:4,borderRadius:99,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:p>90?"linear-gradient(90deg,#f59e0b,#ef4444)":"linear-gradient(90deg,#6366f1,#8b5cf6)",transition:"width .7s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,opacity:.3,marginTop:4}}>
                <span>{(month.items||[]).length} הוצאות · יצא {fmt(ts)}</span>
                <span>{Math.round(p)}%</span>
              </div>
              <button onClick={e=>delMonth(month.id,e)} style={{marginTop:6,fontSize:10,color:"rgba(248,113,113,0.4)",background:"none",border:"none",cursor:"pointer",fontFamily:"Heebo,Arial,sans-serif"}}>🗑 מחק</button>
            </div>;
          })}
          <button onClick={addMonth} style={{padding:"16px 0",borderRadius:18,border:"2px dashed rgba(99,102,241,0.26)",background:"rgba(99,102,241,0.05)",color:"#a5b4fc",fontSize:13,cursor:"pointer",fontFamily:"Heebo,Arial,sans-serif",marginBottom:8}}>
            + הוסף חודש חדש
          </button>
        </div>
      )}
      {nav==="months" && selId && selMonth && (
        <MonthDetail month={selMonth} uid={uid} cats={cats} onUpdate={m=>{updateMonth(m);setSelId(m.id);}} onBack={()=>setSelId(null)}/>
      )}
      {nav==="months" && selId && !selMonth && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:16}}>
          <div style={{opacity:0.4}}>טוען...</div>
          <button onClick={()=>setSelId(null)} style={{...btn(false),padding:"10px 20px"}}>← חזור</button>
        </div>
      )}
      {nav==="assets" && <Assets assets={data.assets} onUpdate={a=>{const nd={...data,assets:a};setData(nd);persist(nd);}}/>}
      {nav==="stats" && <Stats months={data.months}/>}
    </div>

    {showSettings && <CatSettings cats={cats} theme={theme} onUpdate={newCats=>{setCats(newCats);localStorage.setItem("cats",JSON.stringify(newCats));setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
    {/* BottomNav */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",justifyContent:"space-around",padding:"8px 8px 12px",background:isDark?"rgba(8,15,26,0.96)":"rgba(241,245,249,0.96)",backdropFilter:"blur(20px)",borderTop:isDark?"1px solid rgba(255,255,255,0.07)":"1px solid rgba(0,0,0,0.1)",zIndex:100}}>
      {NAVS.map(n => (
        <button key={n.key} onClick={()=>{setNav(n.key);setSelId(null);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,flex:1,background:"none",border:"none",cursor:"pointer",color:nav===n.key?"#a5b4fc":"rgba(255,255,255,0.28)",fontFamily:"Heebo,Arial,sans-serif"}}>
          <span style={{fontSize:20}}>{n.icon}</span>
          <span style={{fontSize:10,fontWeight:nav===n.key?700:400}}>{n.label}</span>
          {nav===n.key&&<div style={{width:3,height:3,borderRadius:99,background:"#6366f1"}}/>}
        </button>
      ))}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
