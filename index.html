<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

  {key:"entertainment",label:"בילויים ושופינג", pct:5, color:"#ec4899",icon:"🎉"},
  {key:"education",    label:"התפתחות",          pct:4, color:"#10b981",icon:"📚"},

/* ─── MATH (SINGLE SOURCE OF TRUTH) ─── */
// budget = income × pct/100  (יתרה לא נכנסת לחישוב!)
const budgetsFor=(cats,income)=>

const totalSpentFrom=items=>(items||[]).reduce((a,i)=>a+(i.amount||0),0);

/* ─── INIT DATA ──────────────────────── */
const INIT={
  cats:DEF_CATS,
  assets:{mom:130000,stocks:90926,fund:300559,emergency:52869,trip:2551,doron:2299},
  months:[
    {id:1,name:"חודש 1",income:22200,leftover:0,
     items:[
       {id:101,cat:"regular",desc:"שכ״ד",amount:4300,by:"u1"},
       {id:102,cat:"regular",desc:"חשמל",amount:420,by:"u1"},
       {id:103,cat:"regular",desc:"נאי",amount:1800,by:"u1"},
       {id:104,cat:"entertainment",desc:"פיצה",amount:176,by:"u2"},
       {id:105,cat:"entertainment",desc:"יוחננוף",amount:340,by:"u2"},
       {id:106,cat:"education",desc:"ספר",amount:214,by:"u2"},
       {id:107,cat:"savings",desc:"חיסכון ינואר",amount:5000,by:"u1"},
     ]},
    {id:2,name:"חודש 2",income:19225,leftover:2227,
     items:[
       {id:201,cat:"regular",desc:"מגפיים",amount:200,by:"u2"},
       {id:202,cat:"entertainment",desc:"מקס סטוק",amount:60,by:"u2"},

     ]},
  ],

/* ─── STORAGE ────────────────────────── */
const LS="bgt9";
const save=d=>{try{localStorage.setItem(LS,JSON.stringify(d))}catch{}};
const load=()=>{try{const s=localStorage.getItem(LS);return s?JSON.parse(s):null}catch{return null}};

/* ─── FORMAT ─────────────────────────── */
const fmt=n=>new Intl.NumberFormat("he-IL",{style:"currency",currency:"ILS",maximumFractionDigits:0}).format(n||0);

/* ─── THEME ──────────────────────────── */
function useTheme(){
  const[t,setT]=useState(()=>localStorage.getItem("th")||"dark");
  const tog=()=>setT(p=>{const n=p==="dark"?"light":"dark";localStorage.setItem("th",n);return n;});
  const d=t==="dark";
  return{
    t,tog,d,
    bg:       d?"#080f1a":"#f0f4f8",
    surf:     d?"rgba(255,255,255,.05)":"rgba(0,0,0,.05)",
    surfH:    d?"rgba(255,255,255,.09)":"rgba(0,0,0,.09)",
    bdr:      d?"rgba(255,255,255,.09)":"rgba(0,0,0,.12)",
    txt:      d?"#e2e8f0":"#1a202c",
    sub:      d?"rgba(255,255,255,.45)":"rgba(0,0,0,.45)",
    navBg:    d?"rgba(8,15,26,.97)":"rgba(240,244,248,.97)",
    cGrad:    d?"linear-gradient(135deg,#1e293b,#0f172a)":"linear-gradient(135deg,#e2e8f0,#cbd5e1)",
  };
}

/* ─── RING ───────────────────────────── */
function Ring({pct,color,size=68}){
  const r=size/2-7,c=2*Math.PI*r,d=Math.min(Math.max(pct||0,0),100)/100*c;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(128,128,128,.18)" strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
        strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{transition:"stroke-dasharray .4s"}}/>
    </svg>
  );
}

/* ─── USER BADGE ─────────────────────── */
function UB({uid}){
  const u=USERS.find(x=>x.id===uid)||USERS[0];
  return<span style={{fontSize:10,padding:"1px 6px",borderRadius:99,background:`${u.color}22`,color:u.color,border:`1px solid ${u.color}44`,whiteSpace:"nowrap"}}>{u.name}</span>;
}

/* ─── INLINE EDIT ────────────────────── */
function EI({val,onSave,style:{},num=false}){
  const[ed,setEd]=useState(false);
  const[v,setV]=useState(val);
  const ref=useRef();
  useEffect(()=>{if(!ed)setV(val)},[val,ed]);
  const commit=()=>{
    const out=num?(parseFloat(v)||0):v.toString().trim();
    if(!num&&!out){setEd(false);return;}
    onSave(out);setEd(false);
  };
  if(ed)return(
    <input ref={ref} autoFocus type={num?"number":"text"} value={v}
      onChange={e=>setV(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}}
      style={{background:"rgba(99,102,241,.18)",border:"1px solid rgba(99,102,241,.5)",borderRadius:8,
        padding:"3px 8px",color:"inherit",outline:"none",fontSize:"inherit",fontWeight:"inherit",
        fontFamily:"Heebo,Arial,sans-serif",minWidth:num?80:100,...(arguments[0].style||{})}}/>
  );
  return(
    <span onClick={()=>{setV(val);setEd(true);}} style={{cursor:"pointer",borderRadius:6,padding:"2px 4px",display:"inline-flex",alignItems:"center",gap:3,...(arguments[0].style||{})}}>
      {num?fmt(val):val}<span style={{fontSize:"0.65em",opacity:.4}}>✏️</span>
    </span>
  );
}

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:320}}>
        {USERS.map(u=>(
          <button key={u.id} onClick={()=>onLogin(u.id)}
            style={{padding:"16px 20px",borderRadius:18,border:`2px solid ${u.color}44`,background:`${u.color}12`,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}
            onTouchStart={e=>e.currentTarget.style.transform="scale(.97)"}
            onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
            <div style={{width:46,height:46,borderRadius:14,background:`${u.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{u.icon}</div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:17,fontWeight:700,color:u.color}}>{u.name}</div>
              <div style={{fontSize:11,color:th.sub}}>לחץ להיכנס</div>
            </div>
            <div style={{marginRight:"auto",color:th.sub,fontSize:18}}>←</div>
          </button>
        ))}
      </div>
      <div style={{fontSize:11,color:th.sub,textAlign:"center"}}>הנתונים מסונכרנים בין שני המשתמשים</div>
    </div>
  );
}

/* ─── CAT SETTINGS ───────────────────── */
function CatSettings({cats,onSave,onBack,th}){
  const[loc,setLoc]=useState(cats.map(c=>({...c})));
  const tot=loc.reduce((a,c)=>a+c.pct,0);
  const ok=tot===100;
  const inp={background:th.surf,border:`1px solid ${th.bdr}`,borderRadius:10,padding:"6px 10px",color:th.txt,outline:"none",fontSize:13,textAlign:"right",width:"100%",fontFamily:"Heebo,Arial,sans-serif"};
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:th.bg}} className="si">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexShrink:0}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:"none",cursor:"pointer",background:th.surf,color:th.txt,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div style={{flex:1,fontSize:17,fontWeight:700,color:th.txt}}>⚙️ עריכת קטגוריות</div>
        <button onClick={()=>ok&&onSave(loc)} style={{padding:"8px 18px",borderRadius:12,border:"none",cursor:ok?"pointer":"default",background:ok?"#6366f1":"rgba(128,128,128,.25)",color:"#fff",fontSize:13,fontWeight:600,opacity:ok?1:.5}}>שמור</button>
      </div>
      <div style={{borderRadius:12,padding:"10px 14px",marginBottom:12,flexShrink:0,
        background:ok?"rgba(16,185,129,.1)":tot>100?"rgba(239,68,68,.1)":"rgba(252,211,77,.1)",
        border:`1px solid ${ok?"#10b981":tot>100?"#ef4444":"#fcd34d"}`}}>
        <span style={{fontSize:13,fontWeight:700,color:ok?"#6ee7b7":tot>100?"#f87171":"#fcd34d"}}>
          {ok?"✓ סה״כ 100% — מושלם!":tot>100?`חריג ב-${tot-100}%`:`נותר ${100-tot}% (סה״כ ${tot}%)`}
        </span>
      </div>
      <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:10}}>
        {loc.map((cat,i)=>(
          <div key={cat.key} style={{borderRadius:16,padding:14,background:th.surf,border:`1px solid ${cat.color}33`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",gap:8,alignItems:"center",flex:1}}>
                <span style={{fontSize:22}}>{cat.icon}</span>
                <input value={cat.label} onChange={e=>setLoc(loc.map((c,j)=>j===i?{...c,label:e.target.value}:c))} style={{...inp,fontSize:14,fontWeight:600,flex:1}}/>
              </div>
              <span style={{fontSize:28,fontWeight:900,color:cat.color,marginRight:8,minWidth:54,textAlign:"left"}}>{cat.pct}%</span>
            </div>
            <input type="range" min="0" max="80" value={cat.pct} style={{width:"100%",accentColor:cat.color,cursor:"pointer"}}
              onChange={e=>setLoc(loc.map((c,j)=>j===i?{...c,pct:parseInt(e.target.value)}:c))}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:th.sub,marginTop:2}}>
              <span>0%</span><span>80%</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── CAT DETAIL ─────────────────────── */
function CatDetail({cat,month,uid,onUpdate,onBack,th}){
  const[showAdd,setShowAdd]=useState(false);
  const[desc,setDesc]=useState("");
  const[amt,setAmt]=useState("");

  const items=(month.items||[]).filter(i=>i.cat===cat.key);
  const spent=items.reduce((a,i)=>a+(i.amount||0),0);
  const budget=(month.budgets||{})[cat.key]||0;

  // ✅ צבע: ירוק = בסדר, אדום = חריגה (חיסכון — אין "חריגה", יש רק יעד)
  const isSavings=cat.key==="savings";
  const goal=month.savingsGoal||budget;
  const over=!isSavings&&spent>budget;
  const pct=budget>0?Math.min(spent/budget*100,100):(spent>0?100:0);
  const barColor=over?"#ef4444":cat.color;
  const amtColor=over?"#f87171":"#6ee7b7";
  const leftAmt=budget-spent;

  const addItem=()=>{
    const a=parseFloat(amt);
    if(!desc.trim()||!a||a<=0)return;
    const item={id:Date.now(),cat:cat.key,desc:desc.trim(),amount:a,by:uid};
    const newItems=[...(month.items||[]),item];
    onUpdate({...month,items:newItems});
    setDesc("");setAmt("");setShowAdd(false);
  };

  const delItem=item=>{
    onUpdate({...month,items:(month.items||[]).filter(i=>i.id!==item.id)});
  };

  const editDesc=(item,v)=>onUpdate({...month,items:(month.items||[]).map(i=>i.id===item.id?{...i,desc:v}:i)});
  const editAmt=(item,v)=>onUpdate({...month,items:(month.items||[]).map(i=>i.id===item.id?{...i,amount:v}:i)});

  const inp={background:th.surf,border:`1px solid ${th.bdr}`,borderRadius:12,padding:"10px 12px",color:th.txt,outline:"none",fontSize:14,textAlign:"right",width:"100%"};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}} className="si">
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexShrink:0}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:"none",cursor:"pointer",background:th.surf,color:th.txt,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <span style={{fontSize:24}}>{cat.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,color:th.txt}}>{cat.label}</div>
          <div style={{fontSize:11,color:th.sub}}>{month.name}</div>
        </div>
        {over&&<span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:8,background:"rgba(239,68,68,.15)",color:"#f87171"}}>⚠️ חריגה!</span>}
      </div>

      {/* Summary card */}
      <div style={{borderRadius:18,padding:14,background:`${cat.color}12`,border:`1px solid ${cat.color}33`,marginBottom:12,flexShrink:0}}>
        <div style={{display:"flex",gap:14,alignItems:"center"}}>
          <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ring pct={pct} color={barColor} size={72}/>
            <span style={{position:"absolute",fontSize:11,fontWeight:700,color:th.txt}}>{Math.round(pct)}%</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,flex:1}}>
            <div>
              <div style={{fontSize:9,color:th.sub}}>תקציב מוקצה</div>
              <div style={{fontSize:16,fontWeight:700,color:cat.color}}>{fmt(budget)}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:th.sub}}>הוצאתי</div>
              <div style={{fontSize:16,fontWeight:700,color:over?"#f87171":th.txt}}>{fmt(spent)}</div>
            </div>
            {isSavings?(
              <div style={{gridColumn:"1/-1"}}>
                <div style={{fontSize:9,color:th.sub}}>🎯 יעד חיסכון החודש</div>
                <div style={{fontSize:16,fontWeight:700,color:"#fcd34d"}}>{fmt(goal)}</div>
                <div style={{fontSize:10,color:spent>=goal?"#6ee7b7":"#fcd34d",marginTop:2}}>
                  {spent>=goal?`✅ עמדת ביעד! חסכת ${fmt(spent)}`:`נותר לחסוך: ${fmt(goal-spent)}`}
                </div>
              </div>
            ):(
              <>
                <div>
                  <div style={{fontSize:9,color:th.sub}}>{over?"חריגה":"נותר"}</div>
                  <div style={{fontSize:16,fontWeight:700,color:amtColor}}>{fmt(Math.abs(leftAmt))}</div>
                </div>
                <div>
                  <div style={{fontSize:9,color:th.sub}}>פריטים</div>
                  <div style={{fontSize:16,fontWeight:700,color:th.txt}}>{items.length}</div>
                </div>
              </>
            )}
          </div>
        </div>
        <div style={{height:6,borderRadius:99,background:"rgba(128,128,128,.2)",marginTop:12,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:99,width:`${Math.min(pct,100)}%`,background:barColor,transition:"width .4s"}}/>
        </div>
      </div>

      {/* Items list */}
      <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:8}}>
        {items.length===0&&!showAdd&&(
          <div style={{textAlign:"center",padding:"40px 0",color:th.sub}}>
            <div style={{fontSize:40,marginBottom:10}}>{cat.icon}</div>
            <div>אין עדיין הוצאות בקטגוריה זו</div>
          </div>
        )}
        {items.map(item=>(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,borderRadius:14,padding:"10px 12px",background:th.surf,border:`1px solid ${cat.color}18`}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <EI val={item.desc} onSave={v=>editDesc(item,v)} style={{fontSize:14,fontWeight:500,color:th.txt}}/>
                <UB uid={item.by}/>
              </div>
            </div>
            <EI val={item.amount} num onSave={v=>editAmt(item,v)} style={{fontSize:14,fontWeight:700,color:cat.color,flexShrink:0}}/>
            <button onClick={()=>delItem(item)} style={{width:28,height:28,borderRadius:8,border:"none",cursor:"pointer",background:"rgba(239,68,68,.15)",color:"#f87171",fontSize:13,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        ))}
        {showAdd?(
          <div style={{borderRadius:16,padding:14,background:th.surf,border:`1px solid ${cat.color}44`,display:"flex",flexDirection:"column",gap:10,marginTop:4}}>
            <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="תיאור ההוצאה" style={inp} autoFocus/>
            <input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="סכום בש״ח" style={inp}
              onKeyDown={e=>e.key==="Enter"&&addItem()}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button onClick={addItem} style={{padding:"12px 0",borderRadius:12,border:"none",cursor:"pointer",background:"#6366f1",color:"#fff",fontSize:14,fontWeight:600}}>✓ הוסף</button>
              <button onClick={()=>{setShowAdd(false);setDesc("");setAmt("");}} style={{padding:"12px 0",borderRadius:12,border:"none",cursor:"pointer",background:th.surf,color:th.txt,fontSize:14}}>ביטול</button>
            </div>
          </div>
        ):(
          <button onClick={()=>setShowAdd(true)}
            style={{padding:"16px 0",borderRadius:16,border:`2px dashed ${cat.color}55`,background:`${cat.color}07`,color:cat.color,fontSize:13,cursor:"pointer",marginTop:4}}>
            + הוסף הוצאה ל{cat.label}
          </button>
        )}
      </div>
    </div>
  );
}

/* ─── MONTH DETAIL ───────────────────── */
function MonthDetail({month,cats,uid,onUpdate,onBack,th}){
  const[cv,setCv]=useState(null);
  const sc=cv?cats.find(c=>c.key===cv):null;

  // ✅ חישוב נכון:
  // income = הכנסה חודשית
  // leftover = יתרה מחודש קודם (מוצגת למידע בלבד, לא נכנסת לתקציב!)
  // budgets = income × pct
  // spent per cat = סכום פריטים בלבד
  const income=month.income||0;
  const leftover=month.leftover||0;
  const budgets=budgetsFor(cats,income);
  const totalBudget=Object.values(budgets).reduce((a,b)=>a+b,0);
  const totalSpent=totalSpentFrom(month.items);
  const remaining=income-totalSpent; // כמה נותר מההכנסה
  const pctUsed=income>0?Math.min(totalSpent/income*100,100):0;

  const updIncome=v=>{
    const sg=Math.round(v*((cats.find(c=>c.key==="savings")||{}).pct||0)/100);
    onUpdate({...month,income:v,budgets:budgetsFor(cats,v),savingsGoal:sg});
  };
  const updLeftover=v=>onUpdate({...month,leftover:v});

  if(sc)return<CatDetail cat={sc} month={{...month,budgets}} uid={uid} onUpdate={m=>onUpdate(m)} onBack={()=>setCv(null)} th={th}/>;

  const inp={background:th.surf,border:`1px solid ${th.bdr}`,borderRadius:10,padding:"7px 10px",color:th.txt,outline:"none",fontSize:13,textAlign:"right",width:"100%",fontFamily:"Heebo,Arial,sans-serif"};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}} className="fi">
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexShrink:0}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:"none",cursor:"pointer",background:th.surf,color:th.txt,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div style={{flex:1}}>
          <EI val={month.name} onSave={v=>onUpdate({...month,name:v})} style={{fontSize:17,fontWeight:700,color:th.txt}}/>
        </div>
      </div>

      {/* Income card */}
      <div style={{borderRadius:18,padding:14,background:th.cGrad,border:`1px solid ${th.bdr}`,marginBottom:8,flexShrink:0}}>

        {/* יתרה מחודש קודם — בנפרד, בולטת */}
        {leftover>0&&(
          <div style={{borderRadius:12,padding:"8px 12px",background:"rgba(252,211,77,.12)",border:"1px solid rgba(252,211,77,.3)",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#fcd34d",fontWeight:600}}>💰 יתרה מחודש קודם</span>
            <span style={{fontSize:16,fontWeight:900,color:"#fcd34d"}}>{fmt(leftover)}</span>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div>
            <div style={{fontSize:9,color:th.sub,marginBottom:3}}>💵 הכנסה חודשית</div>
            <input type="number" value={income||""} onChange={e=>updIncome(parseFloat(e.target.value)||0)} placeholder="הכנס סכום" style={inp}/>
          </div>
          <div>
            <div style={{fontSize:9,color:"#fcd34d",marginBottom:3}}>💰 יתרה מחודש קודם</div>
            <input type="number" value={leftover||""} onChange={e=>updLeftover(parseFloat(e.target.value)||0)} placeholder="0" style={{...inp,color:"#fcd34d",border:"1px solid rgba(252,211,77,.35)"}}/>
            <div style={{fontSize:9,color:th.sub,marginTop:2}}>מוצג בלבד, לא משפיע על תקציב</div>
          </div>
        </div>

        {/* Summary: 3 boxes */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,borderTop:`1px solid ${th.bdr}`,paddingTop:10}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:th.sub}}>תקציב</div>
            <div style={{fontSize:13,fontWeight:700,color:"#a5b4fc"}}>{fmt(totalBudget)}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:th.sub}}>הוצאתי</div>
            <div style={{fontSize:13,fontWeight:700,color:remaining<0?"#f87171":"#e2e8f0"}}>{fmt(totalSpent)}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:th.sub}}>נותר</div>
            <div style={{fontSize:13,fontWeight:700,color:remaining>=0?"#6ee7b7":"#f87171"}}>{fmt(remaining)}</div>
          </div>
        </div>

        {/* Progress */}
        <div style={{height:5,borderRadius:99,background:"rgba(128,128,128,.2)",marginTop:10,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:99,width:`${pctUsed}%`,background:pctUsed>100?"#ef4444":"linear-gradient(90deg,#6366f1,#8b5cf6)",transition:"width .4s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:th.sub,marginTop:3}}>
          <span>0%</span><span style={{color:pctUsed>100?"#f87171":"#6ee7b7"}}>{Math.round(pctUsed)}% נוצל</span><span>100%</span>
        </div>
      </div>

      {/* Categories */}
      <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:8}}>
        {cats.map(cat=>{
          const budget=budgets[cat.key]||0;
          const spent=spentFor(month.items,cat.key);
          const pct=budget>0?Math.min(spent/budget*100,100):(spent>0?100:0);
          const isSavings=cat.key==="savings";
          // ✅ צבע: ירוק = לא חרגת, אדום = חרגת (לחיסכון אין חריגה)
          const over=!isSavings&&spent>budget;
          const amtColor=over?"#f87171":"#6ee7b7";
          const barColor=over?"#ef4444":cat.color;
          const goal=month.savingsGoal||budget;
          const cnt=(month.items||[]).filter(i=>i.cat===cat.key).length;

          return(
            <div key={cat.key} onClick={()=>setCv(cat.key)}
              style={{borderRadius:18,padding:14,cursor:"pointer",background:th.surf,border:`1px solid ${over?"rgba(239,68,68,.3)":cat.color+"22"}`,transition:"background .12s"}}
              onTouchStart={e=>e.currentTarget.style.background=th.surfH}
              onTouchEnd={e=>e.currentTarget.style.background=th.surf}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:20}}>{cat.icon}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:th.txt}}>{cat.label}</div>
                    <div style={{fontSize:10,color:th.sub}}>{cnt} פריטים · {cat.pct}% · {fmt(budget)}</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{textAlign:"left"}}>
                    {/* הסכום שהוצאתי */}
                    <div style={{fontSize:14,fontWeight:700,color:amtColor}}>{fmt(spent)}</div>
                    {isSavings?(
                      <div style={{fontSize:9,color:spent>=goal?"#6ee7b7":"#fcd34d"}}>
                        {spent>=goal?"✅ יעד הושג":` יעד: ${fmt(goal)}`}
                      </div>
                    ):(
                      <div style={{fontSize:9,color:over?"#f87171":th.sub}}>
                        {over?`חריגה: ${fmt(spent-budget)}`:`נותר: ${fmt(budget-spent)}`}
                      </div>
                    )}
                  </div>
                  <span style={{color:th.sub}}>←</span>
                </div>
              </div>
              {/* Progress bar */}
              <div style={{height:5,borderRadius:99,background:"rgba(128,128,128,.18)",overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:barColor,transition:"width .4s"}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── ASSETS ─────────────────────────── */
// ── ASSET ITEM ROW ──
function AssetRow({it,color,onSaveAmount,onSaveLabel,onDel,th}){
  const[val,setVal]=useState(it.amount===0?"":String(it.amount));
  const typing=React.useRef(false);
  useEffect(()=>{if(!typing.current)setVal(it.amount===0?"":String(it.amount));},[it.amount]);
  const inp={background:th.surf,border:`1px solid ${th.bdr}`,borderRadius:10,padding:"5px 8px",color,outline:"none",fontSize:13,textAlign:"right",fontFamily:"Heebo,Arial,sans-serif",fontWeight:700,width:110};
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,borderRadius:12,padding:"8px 10px",background:`${color}0a`,border:`1px solid ${color}18`}}>
      <div style={{flex:1,minWidth:0}}>
        <EI val={it.label} onSave={onSaveLabel} style={{fontSize:13,fontWeight:500,color:th.txt}}/>
      </div>
      <input type="number" value={val} style={inp}
        onChange={e=>{typing.current=true;setVal(e.target.value);}}
        onBlur={()=>{typing.current=false;onSaveAmount(parseFloat(val)||0);}}
        onKeyDown={e=>e.key==="Enter"&&e.target.blur()}/>
      <button onClick={onDel} style={{width:26,height:26,borderRadius:7,border:"none",cursor:"pointer",background:"rgba(239,68,68,.15)",color:"#f87171",fontSize:11,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
    </div>
  );
}

function Assets({assets,onUpdate,th}){
  const normalize=a=>{
    if(a&&a.items)return a;
    return{
      labels:{liquid:"💧 כסף נזיל",emergency:"🛡️ כסף בחירום"},
      items:[
        {key:"mom",    label:"אמא",        amount:a.mom||130000,     group:"liquid"},
        {key:"stocks", label:"מניות",       amount:a.stocks||90926,   group:"liquid"},
        {key:"fund",   label:"קרן כספית",   amount:a.fund||300559,    group:"liquid"},
        {key:"trip",   label:"טיול",        amount:a.trip||2551,      group:"liquid"},
        {key:"doron",  label:"דורון K130",  amount:a.doron||2299,     group:"liquid"},
        {key:"emergency",label:"קרן חירום", amount:a.emergency||52869,group:"emergency"},
      ]
    };
  };
  const data=normalize(assets);
  const labels=data.labels||{liquid:"💧 כסף נזיל",emergency:"🛡️ כסף בחירום"};
  const items=data.items||[];
  const liquidItems=items.filter(i=>i.group==="liquid");
  const emergencyItems=items.filter(i=>i.group==="emergency");
  const liquidTotal=liquidItems.reduce((a,i)=>a+(i.amount||0),0);
  const emergencyTotal=emergencyItems.reduce((a,i)=>a+(i.amount||0),0);
  const grandTotal=liquidTotal+emergencyTotal;
  const upd=nd=>onUpdate(nd);
  const updAmt=(key,v)=>upd({...data,items:items.map(i=>i.key===key?{...i,amount:v}:i)});
  const updLbl=(key,v)=>upd({...data,items:items.map(i=>i.key===key?{...i,label:v}:i)});
  const addItem=group=>upd({...data,items:[...items,{key:"item_"+Date.now(),label:"פריט חדש",amount:0,group}]});
  const delItem=key=>upd({...data,items:items.filter(i=>i.key!==key)});
  const renderSection=(group,color,groupItems,groupTotal)=>(
    <div style={{borderRadius:18,padding:14,background:th.surf,border:`1px solid ${color}33`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <EI val={labels[group]} onSave={v=>upd({...data,labels:{...labels,[group]:v}})} style={{fontSize:14,fontWeight:700,color}}/>
        <span style={{fontSize:16,fontWeight:900,color}}>{fmt(groupTotal)}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {groupItems.map(it=>(
          <AssetRow key={it.key} it={it} color={color} th={th}
            onSaveAmount={v=>updAmt(it.key,v)}
            onSaveLabel={v=>updLbl(it.key,v)}
            onDel={()=>delItem(it.key)}/>
        ))}
      </div>
      <button onClick={()=>addItem(group)} style={{marginTop:10,width:"100%",padding:"9px 0",borderRadius:12,border:`2px dashed ${color}44`,background:`${color}07`,color,fontSize:12,cursor:"pointer",fontFamily:"Heebo,Arial,sans-serif"}}>+ הוסף שורה</button>
    </div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12,overflowY:"auto",flex:1}} className="fi">
      <div style={{borderRadius:22,padding:20,textAlign:"center",background:"linear-gradient(135deg,#6366f1,#8b5cf6)"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.8)",marginBottom:4}}>סה"כ הון עצמי</div>
        <div style={{fontSize:34,fontWeight:900,color:"#fff"}}>{fmt(grandTotal)}</div>
        <div style={{display:"flex",justifyContent:"center",gap:20,marginTop:10}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>💧 נזיל</div>
            <div style={{fontSize:14,fontWeight:700,color:"#a5f3fc"}}>{fmt(liquidTotal)}</div>
          </div>
          <div style={{width:1,background:"rgba(255,255,255,.2)"}}/>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>🛡️ חירום</div>
            <div style={{fontSize:14,fontWeight:700,color:"#fcd34d"}}>{fmt(emergencyTotal)}</div>
          </div>
        </div>
      </div>
      {renderSection("liquid","#0ea5e9",liquidItems,liquidTotal)}
      {renderSection("emergency","#f59e0b",emergencyItems,emergencyTotal)}
    </div>
  );
}

/* ─── STATS ──────────────────────────── */
function Stats({months,cats,th}){
  const ti=months.reduce((a,m)=>a+(m.income||0),0);
  const ts=months.reduce((a,m)=>a+spentFor(m.items,"savings"),0);
  const allItems=months.flatMap(m=>m.items||[]);
  const byUser=USERS.map(u=>({...u,total:allItems.filter(i=>i.by===u.id).reduce((a,i)=>a+(i.amount||0),0)}));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12,overflowY:"auto",flex:1}} className="fi">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[["💰","הכנסות",fmt(ti),"#a5b4fc"],["🏦","חיסכון",fmt(ts),"#6ee7b7"],
          ["📊","% חיסכון",`${ti>0?Math.round(ts/ti*100):0}%`,"#f9a8d4"],
          ["📅","חודשים",months.length,"#fcd34d"]].map(([ic,l,v,c])=>(
          <div key={l} style={{borderRadius:16,padding:14,textAlign:"center",background:th.surf,border:`1px solid ${th.bdr}`}}>
            <div style={{fontSize:22,marginBottom:4}}>{ic}</div>
            <div style={{fontSize:9,color:th.sub,marginBottom:4}}>{l}</div>
            <div style={{fontSize:17,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{borderRadius:16,padding:14,background:th.surf,border:`1px solid ${th.bdr}`}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:12}}>הוצאות לפי משתמש</div>
        {byUser.map(u=>(
          <div key={u.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:18}}>{u.icon}</span>
              <span style={{fontSize:13,fontWeight:600,color:u.color}}>{u.name}</span>
            </div>
            <span style={{fontSize:14,fontWeight:700,color:th.txt}}>{fmt(u.total)}</span>
          </div>
        ))}
      </div>
      {cats.map(cat=>{
        const tb=months.reduce((a,m)=>a+(budgetsFor(cats,m.income||0)[cat.key]||0),0);
        const te=allItems.filter(i=>i.cat===cat.key).reduce((a,i)=>a+(i.amount||0),0);
        const p=tb>0?Math.min(te/tb*100,100):0;
        const over=!cat.key==="savings"&&te>tb;
        return(
          <div key={cat.key} style={{borderRadius:16,padding:14,background:th.surf,border:`1px solid ${cat.color}22`}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:18}}>{cat.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:th.txt}}>{cat.label}</div>
                <div style={{fontSize:10,color:th.sub}}>תקציב: {fmt(tb)} | בפועל: {fmt(te)}</div>
              </div>
              <span style={{fontSize:13,fontWeight:700,color:over?"#f87171":"#6ee7b7"}}>{Math.round(p)}%</span>
            </div>
            <div style={{height:4,borderRadius:99,background:"rgba(128,128,128,.15)",overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:cat.color,transition:"width .4s"}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ─── APP ────────────────────────────── */
function App(){
  const th=useTheme();
  const[uid,setUid]=useState(null);
  const[conn,setConn]=useState(false);
  const[sync,setSync]=useState(false);
  const[data,setData]=useState(INIT);
  const[nav,setNav]=useState("months");
  const[sel,setSel]=useState(null);
  const[showSet,setShowSet]=useState(false);

  const cats=(data.cats&&data.cats.length>0)?data.cats:DEF_CATS;

  useEffect(()=>{
    const loc=load();
    if(loc&&loc.months)setData(loc);
    const connect=()=>{
      window._fb.on(window._fb.r("budget"),snap=>{
        const d=snap.val();
        if(d&&d.months)setData({cats:d.cats||DEF_CATS,assets:d.assets||INIT.assets,months:d.months});
        setConn(true);setSync(false);
      });
    };
    if(window._fb?.ok)connect();
    else window.addEventListener("fb-ready",connect,{once:true});
  },[]);

  const persist=useCallback(nd=>{
    save(nd);
    if(window._fb?.ok){
      setSync(true);
      window._fb.set(window._fb.r("budget"),{...nd,_t:Date.now()})
        .then(()=>setSync(false)).catch(()=>setSync(false));
    }
  },[]);

  const updMonth=useCallback(m=>{
    setData(prev=>{
      const nd={...prev,months:prev.months.map(x=>x.id===m.id?m:x)};
      persist(nd);return nd;
    });
    setSel(m.id);
  },[persist]);

  const addMonth=()=>{
    const last=data.months[data.months.length-1];
    const lastIncome=last?(last.income||0):0;
    const lastSpent=last?totalSpentFrom(last.items):0;
    const leftover=Math.max(0,Math.round(lastIncome-lastSpent));
    const nm={
      id:Date.now(),name:`חודש ${data.months.length+1}`,
      income:0,leftover,savingsGoal:0,
      budgets:budgetsFor(cats,0),
      items:[],
    };
    setData(prev=>{const nd={...prev,months:[...prev.months,nm]};persist(nd);return nd;});
  };

  const delMonth=(id,e)=>{
    e.stopPropagation();
    setData(prev=>{const nd={...prev,months:prev.months.filter(m=>m.id!==id)};persist(nd);return nd;});
    if(sel===id)setSel(null);
  };

  const saveCats=newCats=>{
    setData(prev=>{
      const months=prev.months.map(m=>({
        ...m,
        budgets:budgetsFor(newCats,m.income||0),
        savingsGoal:Math.round((m.income||0)*((newCats.find(c=>c.key==="savings")||{}).pct||0)/100),
      }));
      const nd={...prev,cats:newCats,months};persist(nd);return nd;
    });
    setShowSet(false);
  };

  if(!uid)return<Login onLogin={setUid} th={th}/>;

  const cu=USERS.find(u=>u.id===uid)||USERS[0];
  const selMonth=sel?data.months.find(m=>m.id===sel):null;
  const NAVS=[{key:"months",icon:"📅",label:"חודשים"},{key:"assets",icon:"💎",label:"נכסים"},{key:"stats",icon:"📊",label:"סטטיסטיקה"}];

  return(
    <div style={{background:th.bg,color:th.txt,height:"100%",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",transition:"background .3s"}}>

      {/* Settings overlay */}
      {showSet&&(
        <div style={{position:"fixed",inset:0,zIndex:300,maxWidth:480,margin:"0 auto",padding:"14px 16px 80px",background:th.bg,display:"flex",flexDirection:"column"}}>
          <CatSettings cats={cats} onSave={saveCats} onBack={()=>setShowSet(false)} th={th}/>
        </div>
      )}

      {/* Top bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px 8px",flexShrink:0}}>
        <div>
          <div style={{fontSize:10,color:th.sub}}>תקציב משפחתי</div>
          <div style={{fontSize:18,fontWeight:900}}>המשפחה שלי 👨‍👩‍👧</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {sync&&<span className="sp" style={{fontSize:14}}>🔄</span>}
          {!sync&&conn&&<span style={{fontSize:11,fontWeight:700,color:"#6ee7b7"}}>🟢 מחובר</span>}
          {!sync&&!conn&&<span className="pu" style={{fontSize:11,color:"#f87171"}}>🔴 מתחבר...</span>}
          <button onClick={th.tog} style={{width:32,height:32,borderRadius:10,border:"none",cursor:"pointer",background:th.surf,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>{th.t==="dark"?"☀️":"🌙"}</button>
          <button onClick={()=>setShowSet(true)} style={{width:32,height:32,borderRadius:10,border:"none",cursor:"pointer",background:th.surf,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>
          <button onClick={()=>{setUid(null);setSel(null);setNav("months");}} style={{padding:"4px 10px",borderRadius:10,border:`1px solid ${cu.color}33`,background:`${cu.color}15`,color:cu.color,cursor:"pointer",fontSize:11,fontFamily:"Heebo,Arial,sans-serif"}}>
            {cu.icon} {cu.name}
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:"hidden",padding:"0 16px 72px",display:"flex",flexDirection:"column"}}>

        {/* Month list */}
        {nav==="months"&&!sel&&(
          <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:10,paddingTop:4}} className="fi">
            {data.months.map(month=>{
              const income=month.income||0;
              const leftover=month.leftover||0;
              const spent=totalSpentFrom(month.items);
              const remaining=income-spent;
              const pct=income>0?Math.min(spent/income*100,100):0;
              return(
                <div key={month.id} onClick={()=>setSel(month.id)}
                  style={{borderRadius:20,padding:16,cursor:"pointer",background:th.cGrad,border:`1px solid ${th.bdr}`,transition:"transform .15s"}}
                  onTouchStart={e=>e.currentTarget.style.transform="scale(.97)"}
                  onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:700,color:th.txt}}>{month.name}</div>
                      <div style={{fontSize:10,color:th.sub}}>הכנסה: {fmt(income)}</div>
                      {leftover>0&&<div style={{fontSize:10,color:"#fcd34d",marginTop:1}}>💰 יתרה: {fmt(leftover)}</div>}
                    </div>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontSize:15,fontWeight:700,color:remaining>=0?"#6ee7b7":"#f87171"}}>{fmt(remaining)}</div>
                      <div style={{fontSize:9,color:th.sub}}>נותר מהכנסה</div>
                    </div>
                  </div>
                  <div style={{height:5,borderRadius:99,background:"rgba(128,128,128,.2)",overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:pct>100?"#ef4444":"linear-gradient(90deg,#6366f1,#8b5cf6)",transition:"width .4s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:th.sub,marginTop:5}}>
                    <span>{(month.items||[]).length} הוצאות · יצא {fmt(spent)}</span>
                    <span>{Math.round(pct)}%</span>
                  </div>
                  <button onClick={e=>delMonth(month.id,e)} style={{marginTop:8,fontSize:10,color:"rgba(248,113,113,.45)",background:"none",border:"none",cursor:"pointer",fontFamily:"Heebo,Arial,sans-serif"}}>🗑 מחק חודש</button>
                </div>
              );
            })}
            <button onClick={addMonth} style={{padding:"16px 0",borderRadius:18,border:"2px dashed rgba(99,102,241,.3)",background:"rgba(99,102,241,.05)",color:"#a5b4fc",fontSize:13,cursor:"pointer",marginBottom:8}}>
              + הוסף חודש חדש
            </button>
          </div>
        )}

        {nav==="months"&&sel&&selMonth&&(
          <MonthDetail month={selMonth} cats={cats} uid={uid} onUpdate={updMonth} onBack={()=>setSel(null)} th={th}/>
        )}
        {nav==="months"&&sel&&!selMonth&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <div style={{color:th.sub}}>החודש לא נמצא</div>
            <button onClick={()=>setSel(null)} style={{padding:"10px 20px",borderRadius:12,border:"none",cursor:"pointer",background:th.surf,color:th.txt}}>← חזור</button>
          </div>
        )}

        {nav==="assets"&&<Assets assets={data.assets} onUpdate={a=>{setData(p=>{const nd={...p,assets:a};persist(nd);return nd;})}} th={th}/>}
        {nav==="stats"&&<Stats months={data.months} cats={cats} th={th}/>}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",justifyContent:"space-around",padding:"8px 8px max(12px,env(safe-area-inset-bottom))",background:th.navBg,backdropFilter:"blur(20px)",borderTop:`1px solid ${th.bdr}`,zIndex:100}}>
        {NAVS.map(n=>(
          <button key={n.key} onClick={()=>{setNav(n.key);setSel(null);}}
            style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1,background:"none",border:"none",cursor:"pointer",color:nav===n.key?"#6366f1":th.sub,fontFamily:"Heebo,Arial,sans-serif",transition:"color .2s"}}>
            <span style={{fontSize:21}}>{n.icon}</span>
            <span style={{fontSize:10,fontWeight:nav===n.key?700:400}}>{n.label}</span>
            {nav===n.key&&<div style={{width:4,height:4,borderRadius:99,background:"#6366f1"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
