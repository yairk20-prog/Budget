<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const USERS = [
  { id:"u1", name:"אני",     color:"#6366f1", icon:"👨" },
  { id:"u2", name:"בת הזוג", color:"#ec4899", icon:"👩" },

const DEFAULT_CATS = [
  { key:"regular",       label:"צריכה שוטפת",   pct:47, color:"#6366f1", icon:"🏠" },
  { key:"entertainment", label:"בילויים וכיף",   pct:5,  color:"#ec4899", icon:"🎉" },
  { key:"shopping",      label:"שופינג",          pct:0,  color:"#f59e0b", icon:"🛍️" },
  { key:"education",     label:"התפתחות",         pct:4,  color:"#10b981", icon:"📚" },
  { key:"maaser",        label:"מעשר",            pct:10, color:"#8b5cf6", icon:"🤝" },
  { key:"savings",       label:"חיסכון",          pct:34, color:"#0ea5e9", icon:"💰" },

const mkBudgets = (cats, income, carry) => {
  const base = (income||0) + (carry||0);
  return Object.fromEntries(cats.map(c => [c.key, Math.round(base * c.pct / 100)]));
};

const mkExpenses = cats => Object.fromEntries(cats.map(c => [c.key, 0]));

const INIT_DATA = {
  cats: DEFAULT_CATS,
  assets: { mom:130000, stocks:90926, fund:300559, emergency:52869, trip:2551, doron:2299 },
  months: [
    { id:1, name:"חודש 1", income:22200, carry:0,
      budgets:{regular:10434,entertainment:1110,shopping:0,education:888,maaser:2220,savings:7548},
      expenses:{regular:7548,entertainment:782,shopping:2220,education:810,maaser:0,savings:8613},
      items:[
        {id:101,cat:"regular",desc:"שכ״ד",amount:4300,by:"u1"},
        {id:102,cat:"regular",desc:"חשמל",amount:420,by:"u1"},
        {id:103,cat:"regular",desc:"נאי",amount:1800,by:"u1"},
        {id:104,cat:"entertainment",desc:"פיצה",amount:176,by:"u2"},

        {id:201,cat:"regular",desc:"מגפיים",amount:200,by:"u2"},
        {id:202,cat:"shopping",desc:"מקס סטוק",amount:60,by:"u2"},
      ]
    },

// ── STORAGE ───────────────────────────
const LS_KEY = "bgt_v7";
const lsSave = d => { try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch {} };
const lsLoad = () => { try { const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; } catch { return null; } };

// ── HELPERS ───────────────────────────
const fmt = n => new Intl.NumberFormat("he-IL",{style:"currency",currency:"ILS",maximumFractionDigits:0}).format(n||0);

function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem("app_theme") || "dark");
  const toggle = () => setTheme(t => { const n=t==="dark"?"light":"dark"; localStorage.setItem("app_theme",n); return n; });
  const d = theme === "dark";
  return {
    theme, toggle,
    bg:          d ? "#080f1a" : "#f0f4f8",
    surface:     d ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)",
    surfaceHov:  d ? "rgba(255,255,255,0.09)" : "rgba(0,0,0,0.09)",
    border:      d ? "rgba(255,255,255,0.09)" : "rgba(0,0,0,0.12)",
    text:        d ? "#e2e8f0" : "#1a202c",
    textSub:     d ? "rgba(255,255,255,0.45)" : "rgba(0,0,0,0.45)",
    navBg:       d ? "rgba(8,15,26,0.96)" : "rgba(240,244,248,0.96)",
    cardGrad:    d ? "linear-gradient(135deg,#1e293b,#0f172a)" : "linear-gradient(135deg,#e2e8f0,#cbd5e1)",
  };
}

// ── UI ATOMS ──────────────────────────
function Ring({ pct, color, size=68 }) {
  const r = size/2 - 7, circ = 2*Math.PI*r, dash = Math.min(pct/100,1)*circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(128,128,128,0.15)" strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{transition:"stroke-dasharray .5s ease"}}/>
    </svg>
  );
}

function UBadge({ uid }) {
  const u = USERS.find(x => x.id===uid) || USERS[0];
  return <span style={{fontSize:10,padding:"1px 6px",borderRadius:99,background:`${u.color}22`,color:u.color,border:`1px solid ${u.color}44`,whiteSpace:"nowrap"}}>{u.name}</span>;
}

function EditText({ value, onSave, style={} }) {
  const [editing, setEditing] = useState(false);
  const [v, setV] = useState(value);
  useEffect(() => { if (!editing) setV(value); }, [value, editing]);
  const commit = () => { if (v.trim()) onSave(v.trim()); setEditing(false); };
  if (editing) return (
    <input autoFocus value={v} onChange={e=>setV(e.target.value)}
      onBlur={commit} onKeyDown={e=>e.key==="Enter"&&commit()}
      style={{background:"rgba(99,102,241,0.15)",border:"1px solid rgba(99,102,241,0.4)",borderRadius:8,padding:"3px 8px",color:"inherit",outline:"none",fontSize:"inherit",fontWeight:"inherit",fontFamily:"Heebo,Arial,sans-serif",minWidth:80,...style}}/>
  );
  return <span onClick={()=>{setV(value);setEditing(true);}} style={{cursor:"pointer",borderRadius:6,padding:"2px 4px",...style}}>{value} ✏️</span>;
}

        <div style={{fontSize:14,color:th.textSub,marginTop:4}}>בחר/י את המשתמש שלך</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:320}}>
        {USERS.map(u => (
          <button key={u.id} onClick={()=>onLogin(u.id)}
            style={{padding:"16px 20px",borderRadius:18,border:`2px solid ${u.color}44`,background:`${u.color}12`,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}
            onTouchStart={e=>e.currentTarget.style.transform="scale(0.97)"}
            onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
            <div style={{width:44,height:44,borderRadius:14,background:`${u.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{u.icon}</div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:16,fontWeight:700,color:u.color}}>{u.name}</div>
              <div style={{fontSize:11,color:th.textSub}}>לחץ להיכנס</div>
            </div>
            <div style={{marginRight:"auto",color:th.textSub}}>←</div>
          </button>
        ))}
      </div>
      <div style={{fontSize:11,color:th.textSub,textAlign:"center"}}>כל המשתמשים רואים ועורכים את אותם הנתונים</div>
    </div>
  );
}

// ── CAT SETTINGS SCREEN ───────────────
function CatSettings({ cats, onSave, onBack, th }) {
  const [local, setLocal] = useState(cats.map(c=>({...c})));
  const total = local.reduce((a,c)=>a+c.pct, 0);
  const ok = total === 100;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:th.bg}} className="slideIn">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexShrink:0}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:"none",cursor:"pointer",background:th.surface,color:th.text,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div style={{flex:1,fontSize:17,fontWeight:700,color:th.text}}>⚙️ עריכת קטגוריות</div>
        <button onClick={()=>ok&&onSave(local)}
          style={{padding:"8px 16px",borderRadius:12,border:"none",cursor:ok?"pointer":"not-allowed",background:ok?"#6366f1":"rgba(128,128,128,0.3)",color:"#fff",fontSize:13,fontWeight:600,opacity:ok?1:0.5}}>
          שמור
        </button>
      </div>

      <div style={{borderRadius:14,padding:"10px 14px",marginBottom:10,flexShrink:0,
        background:ok?"rgba(16,185,129,0.1)":total>100?"rgba(239,68,68,0.1)":"rgba(252,211,77,0.1)",
        border:`1px solid ${ok?"#10b981":total>100?"#ef4444":"#fcd34d"}`}}>
        <span style={{fontSize:13,fontWeight:700,color:ok?"#6ee7b7":total>100?"#f87171":"#fcd34d"}}>
          {ok ? "✓ סה״כ 100% — מושלם!" : `סה״כ ${total}% ${total>100?"— חריג ב-"+(total-100)+"%":"— נותר "+(100-total)+"%"}`}
        </span>
      </div>

      <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:10}}>
        {local.map((cat,i) => (
          <div key={cat.key} style={{borderRadius:16,padding:14,background:th.surface,border:`1px solid ${cat.color}33`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:20}}>{cat.icon}</span>
                <EditText value={cat.label} onSave={v=>setLocal(local.map((c,j)=>j===i?{...c,label:v}:c))} style={{fontSize:14,fontWeight:600,color:th.text}}/>
              </div>
              <span style={{fontSize:26,fontWeight:900,color:cat.color}}>{cat.pct}%</span>
            </div>
            <input type="range" min="0" max="80" value={cat.pct}
              style={{width:"100%",height:6,borderRadius:99,outline:"none",cursor:"pointer",accentColor:cat.color,marginTop:8}}
              onChange={e=>setLocal(local.map((c,j)=>j===i?{...c,pct:parseInt(e.target.value)}:c))}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:th.textSub,marginTop:4}}>

}

// ── CAT DETAIL ────────────────────────
function CatDetail({ cat, month, uid, onUpdate, onBack, th }) {
  const [showAdd, setShowAdd] = useState(false);
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState("");

  const items = (month.items||[]).filter(i => i.cat===cat.key);
  const spent = items.reduce((a,i) => a+i.amount, 0);
  const budget = (month.budgets||{})[cat.key] || 0;
  const pct = budget > 0 ? Math.min((spent/budget)*100, 100) : 0;
  const left = budget - spent;

  const addItem = () => {
    const amt = parseFloat(amount);
    if (!desc.trim() || !amt || amt<=0) return;
    const newItem = { id: Date.now(), cat: cat.key, desc: desc.trim(), amount: amt, by: uid };
    const newItems = [...(month.items||[]), newItem];
    const newExpenses = { ...(month.expenses||{}), [cat.key]: (month.expenses[cat.key]||0) + amt };
    onUpdate({ ...month, items: newItems, expenses: newExpenses });
    setDesc(""); setAmount(""); setShowAdd(false);
  };

  const delItem = (item) => {
    const newItems = (month.items||[]).filter(i => i.id!==item.id);
    const newExpenses = { ...(month.expenses||{}), [cat.key]: Math.max(0,(month.expenses[cat.key]||0)-item.amount) };
    onUpdate({ ...month, items: newItems, expenses: newExpenses });
  };

  const editItemDesc = (item, newDesc) => {
    const newItems = (month.items||[]).map(i => i.id===item.id ? {...i,desc:newDesc} : i);
    onUpdate({ ...month, items: newItems });
  };

  const editItemAmount = (item, newAmt) => {
    const diff = newAmt - item.amount;
    const newItems = (month.items||[]).map(i => i.id===item.id ? {...i,amount:newAmt} : i);
    const newExpenses = { ...(month.expenses||{}), [cat.key]: Math.max(0,(month.expenses[cat.key]||0)+diff) };
    onUpdate({ ...month, items: newItems, expenses: newExpenses });
  };

  const inp = { background:th.surface, border:`1px solid ${th.border}`, borderRadius:12, padding:"9px 12px", color:th.text, outline:"none", fontSize:14, textAlign:"right", width:"100%", fontFamily:"Heebo,Arial,sans-serif" };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}} className="slideIn">
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexShrink:0}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:"none",cursor:"pointer",background:th.surface,color:th.text,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <span style={{fontSize:22}}>{cat.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,color:th.text}}>{cat.label}</div>
          <div style={{fontSize:11,color:th.textSub}}>{month.name}</div>
        </div>
      </div>

      {/* Summary */}
      <div style={{borderRadius:18,padding:14,background:`${cat.color}12`,border:`1px solid ${cat.color}2a`,marginBottom:12,flexShrink:0}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ring pct={pct} color={pct>100?"#ef4444":cat.color}/>
            <span style={{position:"absolute",fontSize:11,fontWeight:700,color:th.text}}>{Math.round(pct)}%</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1}}>
            {[["תקציב",fmt(budget),cat.color],["הוצאתי",fmt(spent),"#f87171"],["נותר",fmt(left),left>=0?"#6ee7b7":"#f87171"],["פריטים",items.length,th.text]].map(([l,v,c])=>(
              <div key={l}>
                <div style={{fontSize:9,color:th.textSub}}>{l}</div>
                <div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{height:5,borderRadius:99,background:"rgba(128,128,128,0.2)",marginTop:10,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:pct>100?"#ef4444":cat.color,transition:"width .6s"}}/>
        </div>
      </div>

      {/* Items list */}
      <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:8}}>
        {items.length===0 && !showAdd && (
          <div style={{textAlign:"center",padding:"40px 0",color:th.textSub}}>
            <div style={{fontSize:36,marginBottom:8}}>{cat.icon}</div>
            <div style={{fontSize:13}}>אין עדיין הוצאות בקטגוריה זו</div>
          </div>
        )}

        {items.map(item => (
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,borderRadius:14,padding:"10px 12px",background:th.surface,border:`1px solid ${cat.color}1a`}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <EditText value={item.desc} onSave={v=>editItemDesc(item,v)} style={{fontSize:14,fontWeight:500,color:th.text}}/>
                <UBadge uid={item.by}/>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <span style={{fontSize:14,fontWeight:700,color:cat.color,cursor:"pointer"}}
                onClick={()=>{const v=prompt("סכום חדש:",item.amount);if(v&&!isNaN(parseFloat(v)))editItemAmount(item,parseFloat(v));}}>
                {fmt(item.amount)}
              </span>
              <button onClick={()=>delItem(item)} style={{width:28,height:28,borderRadius:8,border:"none",cursor:"pointer",background:"rgba(239,68,68,0.15)",color:"#f87171",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
          </div>
        ))}

        {showAdd ? (
          <div style={{borderRadius:16,padding:14,background:th.surface,border:"1px solid rgba(99,102,241,0.3)",display:"flex",flexDirection:"column",gap:10}}>
            <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="תיאור ההוצאה" style={inp} autoFocus/>
            <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="סכום בש״ח" style={inp}
              onKeyDown={e=>e.key==="Enter"&&addItem()}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button onClick={addItem} style={{padding:"11px 0",borderRadius:12,border:"none",cursor:"pointer",background:"#6366f1",color:"#fff",fontSize:13,fontWeight:600}}>✓ הוסף</button>
              <button onClick={()=>{setShowAdd(false);setDesc("");setAmount("");}} style={{padding:"11px 0",borderRadius:12,border:"none",cursor:"pointer",background:th.surface,color:th.text,fontSize:13}}>ביטול</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setShowAdd(true)}
            style={{padding:"15px 0",borderRadius:16,border:`2px dashed ${cat.color}55`,background:`${cat.color}08`,color:cat.color,fontSize:13,cursor:"pointer",marginTop:4}}>
            + הוסף הוצאה ל{cat.label}
          </button>
        )}
      </div>
    </div>
  );
}

// ── MONTH DETAIL ──────────────────────
function MonthDetail({ month, cats, uid, onUpdate, onBack, th }) {
  const [catView, setCatView] = useState(null);
  const selCat = catView ? cats.find(c => c.key===catView) : null;

  const base = (month.income||0) + (month.carry||0);
  const totalSpent = Object.values(month.expenses||{}).reduce((a,b)=>a+b, 0);
  const usedPct = base > 0 ? (totalSpent/base)*100 : 0;
  const left = base - totalSpent;

  const updateIncome = v => {
    const newBudgets = mkBudgets(cats, v, month.carry||0);
    onUpdate({ ...month, income: v, budgets: newBudgets });
  };

  const updateCarry = v => {
    const newBudgets = mkBudgets(cats, month.income||0, v);
    onUpdate({ ...month, carry: v, budgets: newBudgets });
  };

  if (selCat) {
    return <CatDetail cat={selCat} month={month} uid={uid}
      onUpdate={m => onUpdate(m)}
      onBack={() => setCatView(null)} th={th}/>;
  }

  const inp = { background:th.surface, border:`1px solid ${th.border}`, borderRadius:10, padding:"7px 10px", color:th.text, outline:"none", fontSize:13, textAlign:"right", width:"100%", fontFamily:"Heebo,Arial,sans-serif" };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}} className="fadeIn">
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexShrink:0}}>
        <button onClick={onBack} style={{width:38,height:38,borderRadius:12,border:"none",cursor:"pointer",background:th.surface,color:th.text,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div style={{flex:1}}>
          <EditText value={month.name} onSave={v=>onUpdate({...month,name:v})} style={{fontSize:17,fontWeight:700,color:th.text}}/>
        </div>
      </div>

      {/* Summary card */}
      <div style={{borderRadius:18,padding:14,background:th.cardGrad,marginBottom:10,flexShrink:0,border:`1px solid ${th.border}`}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ring pct={usedPct} color={usedPct>90?"#ef4444":"#6366f1"}/>
            <span style={{position:"absolute",fontSize:10,fontWeight:700,color:th.text}}>{Math.round(usedPct)}%</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1}}>
            <div>
              <div style={{fontSize:9,color:th.textSub}}>הכנסה חודשית</div>
              <input type="number" value={month.income||""} onChange={e=>updateIncome(parseFloat(e.target.value)||0)} placeholder="0" style={{...inp,fontSize:12,padding:"4px 8px"}}/>
            </div>
            <div>
              <div style={{fontSize:9,color:th.textSub}}>+ העברה מחודש קודם</div>
              <input type="number" value={month.carry||""} onChange={e=>updateCarry(parseFloat(e.target.value)||0)} placeholder="0" style={{...inp,fontSize:12,padding:"4px 8px"}}/>
            </div>
            <div>
              <div style={{fontSize:9,color:th.textSub}}>סה"כ לניהול</div>
              <div style={{fontSize:14,fontWeight:700,color:th.text}}>{fmt(base)}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:th.textSub}}>נותר</div>
              <div style={{fontSize:14,fontWeight:700,color:left>=0?"#6ee7b7":"#f87171"}}>{fmt(left)}</div>
            </div>
          </div>
        </div>
        {(month.carry||0)>0 && (
          <div style={{marginTop:10,fontSize:11,color:"#fcd34d",background:"rgba(252,211,77,0.1)",borderRadius:8,padding:"6px 10px"}}>
            💡 העברה של {fmt(month.carry)} מחודש קודם נכללת בתקציב
          </div>
        )}
      </div>

      {/* Categories */}
      <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:8}}>
        {cats.map(cat => {
          const budget = (month.budgets||{})[cat.key] || 0;
          const spent = (month.expenses||{})[cat.key] || 0;
          const p = budget > 0 ? Math.min((spent/budget)*100, 100) : 0;
          const over = spent > budget;
          const cnt = (month.items||[]).filter(i => i.cat===cat.key).length;
          return (
            <div key={cat.key} onClick={()=>setCatView(cat.key)}
              style={{borderRadius:18,padding:14,cursor:"pointer",background:th.surface,border:`1px solid ${cat.color}2a`,transition:"background .15s"}}
              onTouchStart={e=>e.currentTarget.style.background=th.surfaceHov}
              onTouchEnd={e=>e.currentTarget.style.background=th.surface}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:20}}>{cat.icon}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:th.text}}>{cat.label}</div>
                    <div style={{fontSize:10,color:th.textSub}}>{cnt} פריטים · {cat.pct}%</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:13,fontWeight:700,color:over?"#f87171":"#6ee7b7"}}>{fmt(spent)}</div>
                    <div style={{fontSize:9,color:th.textSub}}>מתוך {fmt(budget)}</div>
                  </div>
                  <span style={{color:th.textSub,fontSize:14}}>←</span>
                </div>
              </div>
              <div style={{height:4,borderRadius:99,background:"rgba(128,128,128,0.15)",overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:over?"#ef4444":cat.color,transition:"width .6s"}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── ASSETS ────────────────────────────
function Assets({ assets, onUpdate, th }) {
  const items = [
    {key:"mom",label:"אמא",color:"#6366f1",icon:"👩"},
    {key:"stocks",label:"מניות",color:"#10b981",icon:"📈"},
    {key:"fund",label:"קרן כספית",color:"#0ea5e9",icon:"🏦"},
    {key:"emergency",label:"קרן חירום",color:"#f59e0b",icon:"🛡️"},
    {key:"trip",label:"טיול",color:"#ec4899",icon:"✈️"},
    {key:"doron",label:"דורון K130",color:"#8b5cf6",icon:"💼"},
  ];
  const total = Object.values(assets).reduce((a,b)=>a+b, 0);
  const inp = { background:th.surface, border:`1px solid ${th.border}`, borderRadius:10, padding:"6px 10px", color:th.text, outline:"none", fontSize:13, textAlign:"right", width:"100%", fontFamily:"Heebo,Arial,sans-serif" };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12,overflowY:"auto",flex:1}} className="fadeIn">
      <div style={{borderRadius:22,padding:20,textAlign:"center",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",boxShadow:"0 8px 24px rgba(99,102,241,0.25)"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.8)",marginBottom:4}}>סה"כ הון עצמי</div>
        <div style={{fontSize:32,fontWeight:900,color:"#fff"}}>{fmt(total)}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {items.map(it => (
          <div key={it.key} style={{borderRadius:16,padding:14,background:th.surface,border:`1px solid ${it.color}2e`}}>
            <div style={{fontSize:20,marginBottom:4}}>{it.icon}</div>
            <div style={{fontSize:10,color:th.textSub,marginBottom:6}}>{it.label}</div>
            <input type="number" value={assets[it.key]||""} onChange={e=>onUpdate({...assets,[it.key]:parseFloat(e.target.value)||0})} style={{...inp,color:it.color,fontWeight:700}}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── STATS ─────────────────────────────
function Stats({ months, cats, th }) {
  const ti = months.reduce((a,m)=>a+(m.income||0), 0);
  const ts = months.reduce((a,m)=>a+((m.expenses||{}).savings||0), 0);
  const allItems = months.flatMap(m => m.items||[]);
  const byUser = USERS.map(u => ({ ...u, total: allItems.filter(i=>i.by===u.id).reduce((a,i)=>a+i.amount,0) }));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12,overflowY:"auto",flex:1}} className="fadeIn">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[["💰","סה\"כ הכנסות",fmt(ti),"#a5b4fc"],["🏦","חיסכון",fmt(ts),"#6ee7b7"],["📊","% חיסכון",`${ti>0?Math.round(ts/ti*100):0}%`,"#f9a8d4"],["📅","חודשים",months.length,"#fcd34d"]].map(([ic,l,v,c])=>(
          <div key={l} style={{borderRadius:16,padding:14,textAlign:"center",background:th.surface,border:`1px solid ${th.border}`}}>
            <div style={{fontSize:22,marginBottom:4}}>{ic}</div>
            <div style={{fontSize:9,color:th.textSub,marginBottom:4}}>{l}</div>
            <div style={{fontSize:17,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{borderRadius:16,padding:14,background:th.surface,border:`1px solid ${th.border}`}}>
        <div style={{fontSize:12,color:th.textSub,marginBottom:12}}>הוצאות לפי משתמש</div>
        {byUser.map(u => (
          <div key={u.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:18}}>{u.icon}</span>
              <span style={{fontSize:13,fontWeight:600,color:u.color}}>{u.name}</span>
            </div>
            <span style={{fontSize:14,fontWeight:700,color:th.text}}>{fmt(u.total)}</span>
          </div>
        ))}
      </div>

      {cats.map(cat => {
        const tb = months.reduce((a,m)=>a+((m.budgets||{})[cat.key]||0), 0);
        const te = months.reduce((a,m)=>a+((m.expenses||{})[cat.key]||0), 0);
        const p = tb>0 ? Math.min((te/tb)*100,100) : 0;
        return (
          <div key={cat.key} style={{borderRadius:16,padding:14,background:th.surface,border:`1px solid ${cat.color}22`}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:18}}>{cat.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:th.text}}>{cat.label}</div>
                <div style={{fontSize:10,color:th.textSub}}>תקציב: {fmt(tb)} | בפועל: {fmt(te)}</div>
              </div>
              <span style={{fontSize:12,fontWeight:700,color:te>tb?"#f87171":"#6ee7b7"}}>{Math.round(p)}%</span>
            </div>
            <div style={{height:4,borderRadius:99,background:"rgba(128,128,128,0.15)",overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:cat.color,transition:"width .6s"}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── APP ───────────────────────────────
function App() {
  const th = useTheme();
  const [uid, setUid] = useState(null);
  const [connected, setConnected] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [data, setData] = useState(INIT_DATA);
  const [nav, setNav] = useState("months");
  const [selId, setSelId] = useState(null);
  const [showCatSettings, setShowCatSettings] = useState(false);

  const cats = data.cats || DEFAULT_CATS;

  // Firebase + localStorage init
  useEffect(() => {
    const local = lsLoad();
    if (local) setData(local);

    const connect = () => {
      window._fb.onValue(window._fb.ref("budget"), snap => {
        const d = snap.val();
        if (d && d.months) {
          setData({ cats: d.cats||DEFAULT_CATS, assets: d.assets||INIT_DATA.assets, months: d.months });
        }
        setConnected(true);
        setSyncing(false);
      });
    };

    if (window._fb && window._fb.ready) connect();
    else window.addEventListener("fb-ready", connect, { once: true });
  }, []);

  const persist = useCallback((newData) => {
    lsSave(newData);
    if (window._fb && window._fb.ready) {
      setSyncing(true);
      window._fb.set(window._fb.ref("budget"), { ...newData, _t: Date.now() })
        .then(() => setSyncing(false))
        .catch(() => setSyncing(false));
    }
  }, []);

  const updateMonth = useCallback((m) => {
    setData(prev => {
      const newMonths = prev.months.map(x => x.id===m.id ? m : x);
      const nd = { ...prev, months: newMonths };
      persist(nd);
      return nd;
    });
    setSelId(m.id);
  }, [persist]);

  const addMonth = () => {
    const last = data.months[data.months.length-1];
    const lastLeft = last ? ((last.income||0)+(last.carry||0)-Object.values(last.expenses||{}).reduce((a,b)=>a+b,0)) : 0;
    const carry = Math.max(0, Math.round(lastLeft));
    const nm = {
      id: Date.now(),
      name: `חודש ${data.months.length+1}`,
      income: 0,
      carry,
      budgets: mkBudgets(cats, 0, carry),
      expenses: mkExpenses(cats),
      items: [],
    };
    setData(prev => {
      const nd = { ...prev, months: [...prev.months, nm] };
      persist(nd);
      return nd;
    });
  };

  const delMonth = (id, e) => {
    e.stopPropagation();
    if (!window.confirm("למחוק את החודש?")) return;
    setData(prev => {
      const nd = { ...prev, months: prev.months.filter(m => m.id!==id) };
      persist(nd);
      return nd;
    });
    if (selId===id) setSelId(null);
  };

  const saveCats = (newCats) => {
    setData(prev => {
      const nd = { ...prev, cats: newCats };
      persist(nd);
      return nd;
    });
    setShowCatSettings(false);
  };

  if (!uid) return <Login onLogin={setUid} th={th}/>;

  const cu = USERS.find(u => u.id===uid) || USERS[0];
  const selMonth = selId ? data.months.find(m => m.id===selId) : null;
  const NAVS = [{key:"months",icon:"📅",label:"חודשים"},{key:"assets",icon:"💎",label:"נכסים"},{key:"stats",icon:"📊",label:"סטטיסטיקה"}];

  return (
    <div style={{background:th.bg,color:th.text,height:"100%",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",transition:"background .3s,color .3s"}}>

      {/* Cat Settings overlay */}
      {showCatSettings && (
        <div style={{position:"fixed",inset:0,zIndex:300,maxWidth:480,margin:"0 auto",padding:"14px 16px 80px",background:th.bg,display:"flex",flexDirection:"column"}}>
          <CatSettings cats={cats} onSave={saveCats} onBack={()=>setShowCatSettings(false)} th={th}/>
        </div>
      )}

      {/* Top Bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px 8px",flexShrink:0}}>
        <div>
          <div style={{fontSize:10,color:th.textSub}}>תקציב משפחתי</div>
          <div style={{fontSize:19,fontWeight:900}}>המשפחה שלי 👨‍👩‍👧</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {syncing && <span className="spin" style={{fontSize:14}}>🔄</span>}
          {!syncing && connected && <span style={{fontSize:11,fontWeight:700,color:"#6ee7b7"}}>🟢 מחובר</span>}
          {!syncing && !connected && <span className="pulse" style={{fontSize:11,color:"#f87171"}}>🔴 מתחבר...</span>}
          <button onClick={th.toggle} style={{width:32,height:32,borderRadius:10,border:"none",cursor:"pointer",background:th.surface,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {th.theme==="dark"?"☀️":"🌙"}
          </button>
          <button onClick={()=>setShowCatSettings(true)} style={{width:32,height:32,borderRadius:10,border:"none",cursor:"pointer",background:th.surface,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>
          <button onClick={()=>{setUid(null);setSelId(null);setNav("months");}}
            style={{padding:"4px 10px",borderRadius:10,border:`1px solid ${cu.color}33`,background:`${cu.color}15`,color:cu.color,cursor:"pointer",fontSize:11,fontFamily:"Heebo,Arial,sans-serif"}}>
            {cu.icon} {cu.name}
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:"hidden",padding:"0 16px 72px",display:"flex",flexDirection:"column"}}>

        {/* Months list */}
        {nav==="months" && !selId && (
          <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:10,paddingTop:4}} className="fadeIn">
            {data.months.map(month => {
              const ts = Object.values(month.expenses||{}).reduce((a,b)=>a+b, 0);
              const base = (month.income||0)+(month.carry||0);
              const p = base>0 ? Math.min((ts/base)*100,100) : 0;
              const left = base - ts;
              return (
                <div key={month.id} onClick={()=>setSelId(month.id)}
                  style={{borderRadius:20,padding:16,cursor:"pointer",background:th.cardGrad,border:`1px solid ${th.border}`,transition:"transform .15s"}}
                  onTouchStart={e=>e.currentTarget.style.transform="scale(0.97)"}
                  onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:700,color:th.text}}>{month.name}</div>
                      <div style={{fontSize:10,color:th.textSub}}>
                        {fmt(month.income||0)}
                        {(month.carry||0)>0 && <span style={{color:"#fcd34d"}}> +{fmt(month.carry)} העברה</span>}
                      </div>
                    </div>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontSize:15,fontWeight:700,color:left>=0?"#6ee7b7":"#f87171"}}>{fmt(left)}</div>
                      <div style={{fontSize:9,color:th.textSub}}>נותר</div>
                    </div>
                  </div>
                  <div style={{height:5,borderRadius:99,background:"rgba(128,128,128,0.2)",overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:99,width:`${p}%`,background:p>90?"linear-gradient(90deg,#f59e0b,#ef4444)":"linear-gradient(90deg,#6366f1,#8b5cf6)",transition:"width .6s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:th.textSub,marginTop:5}}>
                    <span>{(month.items||[]).length} הוצאות · יצא {fmt(ts)}</span>
                    <span>{Math.round(p)}%</span>
                  </div>
                  <button onClick={e=>delMonth(month.id,e)}
                    style={{marginTop:8,fontSize:10,color:"rgba(248,113,113,0.5)",background:"none",border:"none",cursor:"pointer",fontFamily:"Heebo,Arial,sans-serif"}}>
                    🗑 מחק חודש
                  </button>
                </div>
              );
            })}
            <button onClick={addMonth}
              style={{padding:"16px 0",borderRadius:18,border:"2px dashed rgba(99,102,241,0.3)",background:"rgba(99,102,241,0.05)",color:"#a5b4fc",fontSize:13,cursor:"pointer",marginBottom:8}}>
              + הוסף חודש חדש
            </button>
          </div>
        )}

        {/* Month detail */}
        {nav==="months" && selId && selMonth && (
          <MonthDetail month={selMonth} cats={cats} uid={uid}
            onUpdate={updateMonth}
            onBack={()=>setSelId(null)}
            th={th}/>
        )}

        {/* Month not found fallback */}
        {nav==="months" && selId && !selMonth && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
            <div style={{color:th.textSub,fontSize:14}}>החודש לא נמצא</div>
            <button onClick={()=>setSelId(null)} style={{padding:"10px 20px",borderRadius:12,border:"none",cursor:"pointer",background:th.surface,color:th.text,fontSize:13}}>← חזור</button>
          </div>
        )}

        {nav==="assets" && <Assets assets={data.assets} onUpdate={a=>{setData(p=>{const nd={...p,assets:a};persist(nd);return nd;})}} th={th}/>}
        {nav==="stats" && <Stats months={data.months} cats={cats} th={th}/>}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",justifyContent:"space-around",padding:"8px 8px max(12px,env(safe-area-inset-bottom))",background:th.navBg,backdropFilter:"blur(20px)",borderTop:`1px solid ${th.border}`,zIndex:100}}>
        {NAVS.map(n => (
          <button key={n.key} onClick={()=>{setNav(n.key);setSelId(null);}}
            style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1,background:"none",border:"none",cursor:"pointer",color:nav===n.key?"#6366f1":th.textSub,fontFamily:"Heebo,Arial,sans-serif",transition:"color .2s"}}>
            <span style={{fontSize:21}}>{n.icon}</span>
            <span style={{fontSize:10,fontWeight:nav===n.key?700:400}}>{n.label}</span>
            {nav===n.key && <div style={{width:4,height:4,borderRadius:99,background:"#6366f1"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
